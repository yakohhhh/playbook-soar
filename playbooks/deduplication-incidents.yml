id: deduplication-incidents
version: -1
name: Déduplication et corrélation d'incidents
description: |-
  À l'ouverture d'un incident, recherche les incidents similaires récents avec SearchIncidentsV2. S'il
  en trouve, il lie l'incident courant à ces incidents puis clôture l'incident courant comme doublon.
  C'est toujours l'incident courant qui est clôturé, jamais les incidents trouvés, ce qui évite de
  fermer un parent par erreur. La requête de similarité est fournie en entrée, donc paramétrable.
