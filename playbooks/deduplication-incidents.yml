inputs:
  - key: RequeteSimilarite
    value:
      simple: "status:active and type:${incident.type}"
    required: false
    description: |-
      Requête qui définit ce qu'est un incident similaire (syntaxe de recherche XSOAR). Par défaut, les
      incidents actifs du même type. L'incident courant est automatiquement exclu de la recherche.
    playbookInputQuery: null
  - key: NombreMax
    value:
      simple: "10"
    required: false
    description: Nombre maximum d'incidents similaires à récupérer.
    playbookInputQuery: null
outputs:
  - contextPath: Dedup.Statut
    description: Résultat - doublon lié et clôturé, ou pas de doublon.
    type: string
  - contextPath: Dedup.IncidentsLies
    description: Identifiants des incidents similaires auxquels l'incident courant a été lié.
    type: unknown
