    type: condition
    task:
      id: 42e338ac-d4c9-45f4-8ca5-91bee88f2072
      version: -1
      name: Faux positif connu ?
      description: |-
        Vrai seulement si la valeur comparée n'est pas vide et figure dans l'allow-list. La double
        condition garantit qu'on n'agit que sur une correspondance explicite.
      type: condition
      iscommand: false
      brand: ""
    nexttasks:
      '#default#':
        - "6"
      "yes":
        - "3"
    conditions:
      - label: "yes"
        condition:
          - - operator: isNotEmpty
              left:
                value:
                  simple: inputs.ValeurAComparer
                iscontext: true
          - - operator: inList
              left:
                value:
                  simple: inputs.ValeurAComparer
                iscontext: true
              right:
                value:
                  simple: inputs.MotifsFauxPositifs
                iscontext: true
              ignorecase: true
    separatecontext: false
    continueonerrortype: ""
    view: |-
      {"position": {"x": 450, "y": 340}}
    note: false
