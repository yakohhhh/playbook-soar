id: cloture-faux-positifs
version: -1
name: Clôture automatique des faux positifs connus
description: |-
  Compare une valeur de l'incident à une allow-list de motifs de faux positifs connus. Si cette valeur
  figure dans l'allow-list (comparaison insensible à la casse), l'incident est clôturé en "False
  Positive" avec une note qui garde la trace du motif. Sans correspondance, l'incident suit son cours normal. Le playbook n'utilise que du contenu
  natif XSOAR (condition, script Set, commande Builtin closeInvestigation), il s'importe et s'exécute
  sur une instance vierge.
