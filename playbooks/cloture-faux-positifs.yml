inputs:
  - key: MotifsFauxPositifs
    value: {}
    required: false
    description: |-
      Allow-list des motifs de faux positifs connus, séparés par des virgules (ex :
      "EICAR Test File,Scan Nessus autorisé"). La comparaison est insensible à la casse. Souvent
      alimentée depuis une liste XSOAR maintenue par l'équipe.
    playbookInputQuery: null
  - key: ValeurAComparer
    value:
      simple: "${incident.name}"
    required: false
    description: Valeur de l'incident testée contre l'allow-list. Par défaut le nom de l'incident.
    playbookInputQuery: null
  - key: MotifCloture
    value:
      simple: Clôturé automatiquement par le playbook de faux positifs.
    required: false
    description: Texte ajouté à la note de clôture, après le motif reconnu.
    playbookInputQuery: null
outputs:
  - contextPath: FauxPositifs.Statut
    description: Résultat du tri - clôturé en faux positif, ou laissé au traitement normal.
    type: string
  - contextPath: FauxPositifs.Motif
    description: Motif de faux positif reconnu, quand il y a correspondance.
    type: string
fromversion: 6.5.0
