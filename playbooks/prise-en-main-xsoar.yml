inputs:
  - key: SeuilSeverite
    value:
      simple: "3"
    required: false
    description: |-
      Seuil de sévérité déclenchant la branche d'escalade. Échelle XSOAR : 0 = Inconnue,
      0.5 = Informative, 1 = Faible, 2 = Moyenne, 3 = Élevée, 4 = Critique. Valeur par défaut : 3.
    playbookInputQuery: null
outputs:
  - contextPath: Triage.RecuLe
    description: Date de création de l'incident, relevée au début du triage.
    type: date
  - contextPath: Triage.Decision
    description: Décision de triage retenue - "Escalade" ou "Traitement standard".
    type: string
