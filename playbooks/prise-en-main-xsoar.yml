id: prise-en-main-xsoar
version: -1
name: Prise en main XSOAR - Triage
description: |-
  Playbook d'initiation basé uniquement sur des scripts natifs Cortex XSOAR (Set, Print) et une
  tâche conditionnelle. Il enregistre la date de réception de l'incident, compare sa sévérité à un
  seuil paramétrable, puis oriente vers une branche d'escalade ou de traitement standard.
  Aucune intégration tierce n'est requise : il s'importe et s'exécute tel quel sur une instance vierge.
