inputs:
  - key: SeuilEscalade
    value:
      simple: "3"
    required: false
    description: |-
      Sévérité à partir de laquelle la notification part vers le destinataire prioritaire.
      Échelle XSOAR : 0 = Inconnue, 0.5 = Informative, 1 = Faible, 2 = Moyenne, 3 = Élevée, 4 = Critique.
    playbookInputQuery: null
  - key: DestinatairePrioritaire
    value:
      simple: "${incident.owner}"
    required: false
    description: |-
      Destinataire ou canal notifié quand la sévérité atteint le seuil (ex : équipe d'astreinte).
      Par défaut le propriétaire de l'incident, à remplacer par un vrai canal ou utilisateur.
    playbookInputQuery: null
  - key: DestinataireStandard
    value:
      simple: "${incident.owner}"
    required: false
    description: |-
      Destinataire ou canal notifié sous le seuil de sévérité.
      Par défaut le propriétaire de l'incident, à remplacer par un vrai canal ou utilisateur.
    playbookInputQuery: null
  - key: DestinataireEscalade
    value:
      simple: "${incident.owner}"
    required: false
    description: |-
      Destinataire ou canal prévenu en cas d'escalade (ex : responsable, lead SOC).
      Par défaut le propriétaire de l'incident, à remplacer par un vrai contact.
    playbookInputQuery: null
  - key: CreerTicketITSM
    value:
      simple: "false"
    required: false
    description: Si "true", ajoute une tâche manuelle de création de ticket ITSM sur la branche d'escalade.
    playbookInputQuery: null
outputs:
  - contextPath: Notification.Destinataire
    description: Destinataire retenu pour la notification, selon la sévérité.
    type: string
  - contextPath: Notification.Statut
    description: Résultat du suivi - "Accusé reçu" ou "Escalade - pas d'accusé dans le délai".
    type: string
  - contextPath: Notification.TicketITSM
    description: Renseigné quand un ticket ITSM a été ouvert sur la branche d'escalade.
    type: string
