id: notification-et-escalade
version: -1
name: Notification et escalade
description: |-
  Notifie un destinataire choisi selon la sévérité de l'incident et attend un accusé de réception.
  Sans accusé dans le délai, l'incident est escaladé vers un autre contact. L'accusé passe par une
  tâche de communication native XSOAR : par défaut le destinataire répond depuis le plan de travail de
  l'incident, et on peut pousser la demande sur un canal externe (Email, Slack ou Mattermost) en
  renseignant la méthode d'envoi. Aucun destinataire n'est codé en dur. Une création de ticket ITSM
  manuelle peut être activée en entrée.
