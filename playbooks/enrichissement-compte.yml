id: enrichissement-compte
version: -1
name: Enrichissement de compte utilisateur
description: |-
  Résout un compte dans l'Active Directory à partir d'un identifiant, puis remonte les attributs utiles
  au triage : groupes, valeur userAccountControl (pour lire l'état activé ou désactivé) et un drapeau
  compte à privilèges basé sur un mot-clé de groupe. Si le compte est introuvable ou si l'intégration
  n'est pas disponible, le playbook se termine proprement avec un statut adapté au lieu de planter.
