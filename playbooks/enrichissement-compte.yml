inputs:
  - key: NomUtilisateur
    value: {}
    required: false
    description: Identifiant du compte à enrichir (login, avec ou sans préfixe de domaine).
    playbookInputQuery: null
  - key: MotifGroupePrivilegie
    value:
      simple: Admin
    required: false
    description: |-
      Mot-clé recherché dans les groupes du compte pour signaler un compte à privilèges. Par défaut
      "Admin", ce qui couvre Domain Admins, Administrators, etc.
    playbookInputQuery: null
outputs:
  - contextPath: Compte.Statut
    description: Résultat de la résolution - Trouvé ou Introuvable.
    type: string
  - contextPath: Compte.Groupes
    description: Groupes d'appartenance du compte.
    type: unknown
  - contextPath: Compte.UAC
    description: Valeur userAccountControl, à lire pour savoir si le compte est désactivé.
    type: unknown
  - contextPath: Compte.APrivileges
    description: Oui si un groupe à privilèges a été détecté, Non sinon.
    type: string
